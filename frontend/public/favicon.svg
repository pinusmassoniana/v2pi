<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="v2pi">
  <defs>
    <!-- mirrors the in-app brand mark: linear-gradient(150deg, #0b6bd8, color-mix(#0b6bd8 58% / #000)) -->
    <linearGradient id="bg" x1="0.15" y1="0" x2="0.62" y2="1">
      <stop offset="0" stop-color="#0b6bd8"/>
      <stop offset="1" stop-color="#063e7d"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="9.5" fill="url(#bg)"/>
  <rect width="32" height="32" rx="9.5" fill="url(#sheen)"/>
  <text x="16" y="17" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
        font-size="15.5" font-weight="800" letter-spacing="-0.5" fill="#ffffff">v2</text>
</svg>
