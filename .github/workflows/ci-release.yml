name: ci-release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: false

env:
  # Keep the established public package name even though the repository was renamed.
  IMAGE: ghcr.io/pinusmassoniana/v2pi-x

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
      - name: Verify lock and run pytest
        working-directory: backend
        run: |
          uv lock --check
          uv run --locked pytest -q

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked dependencies
        working-directory: frontend
        run: npm ci
      - name: TypeScript contract check
        working-directory: frontend
        run: npm run check
      - name: Vitest
        working-directory: frontend
        run: npm test
      - name: Build SPA
        working-directory: frontend
        run: npm run build

  dep-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
      - name: Python advisory gate (all reported severities)
        working-directory: backend
        run: uv audit --locked
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
      - name: npm advisory gate (high and critical)
        working-directory: frontend
        run: npm audit --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
      - name: Build SPA into backend static
        working-directory: frontend
        run: npm ci && npm run build
      - name: Sync locked backend dependencies
        working-directory: backend
        run: uv sync --locked
      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: Run isolated e2e
        working-directory: e2e
        run: npx playwright test
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

  build-image:
    needs: [backend-tests, frontend-tests, dep-audit, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push untagged ${{ matrix.arch }} image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
      - name: Smoke exact image digest
        run: scripts/container-smoke.sh "${IMAGE}@${{ steps.build.outputs.digest }}" "linux/${{ matrix.arch }}"
      - name: Export tested digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  publish-manifest:
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: version
        run: |
          version=$(grep -m1 '^version' backend/pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          [ -n "$version" ] || { echo "could not parse version"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "minor=$(echo "$version" | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$version" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish manifest from tested digests
        env:
          VERSION: ${{ steps.version.outputs.version }}
          MINOR: ${{ steps.version.outputs.minor }}
        run: |
          refs=()
          for digest_file in /tmp/digests/*; do
            refs+=("${IMAGE}@sha256:$(basename "$digest_file")")
          done
          [ "${#refs[@]}" -eq 2 ] || { echo "expected two tested platform digests"; exit 1; }
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:${MINOR}" \
            "${refs[@]}"
      - name: Tag and release new version
        if: steps.version.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
