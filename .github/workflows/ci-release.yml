name: ci-release

# Trigger on push to main (publishes) and on PRs to main (tests only, no publish).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write   # create version git tags + GitHub Releases
  packages: write   # push images to GHCR

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: false

env:
  # Hardcoded (not ${{ github.repository }}) so the published package name stays `v2pi-x` even
  # though the repo was renamed to `v2pi` — keeps the existing public GHCR package + the Pi's pull.
  IMAGE: ghcr.io/pinusmassoniana/v2pi-x

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
      - name: pytest
        working-directory: backend
        run: uv run pytest -q

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci
      - name: vitest
        working-directory: frontend
        run: npm test
      - name: build SPA (sanity)
        working-directory: frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
      - name: build SPA into backend static
        working-directory: frontend
        run: npm ci && npm run build
      - name: sync backend deps
        working-directory: backend
        run: uv sync
      - name: install e2e deps
        working-directory: e2e
        run: npm ci
      - name: install Playwright (chromium)
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: run e2e
        working-directory: e2e
        run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

  # Only after every gate is green, and only on a push to main, build + publish the
  # arm64 image. Native arm64 runner (free for public repos); if it's ever unavailable,
  # swap to `runs-on: ubuntu-latest` + a `docker/setup-qemu-action@v3` step before buildx.
  build-and-push:
    needs: [backend-tests, frontend-tests, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # tags needed to tell whether this version is new
      - name: Resolve version from backend/pyproject.toml
        id: ver
        run: |
          V=$(grep -m1 '^version' backend/pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          [ -n "$V" ] || { echo "could not parse version"; exit 1; }
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "minor=$(echo "$V" | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$V" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Version $V (tag exists: $(git rev-parse "v$V" >/dev/null 2>&1 && echo yes || echo no))"
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push arm64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:${{ steps.ver.outputs.minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Tag + release (new version only)
        if: steps.ver.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"
          gh release create "v${{ steps.ver.outputs.version }}" \
            --title "v${{ steps.ver.outputs.version }}" \
            --generate-notes
