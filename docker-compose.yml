services:
  v2pi:
    image: ghcr.io/pinusmassoniana/v2pi-x:latest   # published arm64 image — `docker compose pull` grabs it
    build: .                                        # `docker compose up --build` builds from source instead (dev)
    network_mode: host          # tproxy / nft / dnsmasq live in the host netns (Pi)
    cap_add:
      - NET_ADMIN               # nftables
      - NET_RAW                 # tproxy / raw sockets
    env_file:
      - path: .env              # optional overrides; absent .env is fine (zero-config)
        required: false
    environment:
      PI_GW_NET_BACKEND: linux    # Plan 8: real nft tproxy + policy-routing apply (LinuxBackend)
      PI_GW_DATA_DIR: /data
      PI_GW_PORT: "8080"
    volumes:
      - v2pi-data:/data
      - /var/lib/misc:/var/lib/misc:ro   # host dnsmasq leasefile (pi-gw-dhcp.service) → DHCP-client count
    restart: unless-stopped

volumes:
  v2pi-data:
