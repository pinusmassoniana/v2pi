services:
  v2pi:
    # Deployment must select an immutable manifest, for example
    # ghcr.io/pinusmassoniana/v2pi-x@sha256:<64-hex-digest>. Tags are not accepted operationally.
    image: ${V2PI_IMAGE:?Set V2PI_IMAGE to an immutable ghcr.io/pinusmassoniana/v2pi-x@sha256 digest}
    build: .                                        # `docker compose up --build` builds from source for the host arch instead (dev)
    network_mode: host          # tproxy / nft / dnsmasq live in the host netns (Pi)
    privileged: true            # Pi acceptance dependency: writable /proc/sys plus host net ownership.
                                # Removing this requires a native Pi cutover/rollback test; cap_add
                                # alone cannot write the required forwarding/accept_ra sysctls.
    pid: host                   # manage host services during migration (stop legacy dhcp/radvd via nsenter)
    cap_add:
      - NET_ADMIN               # nftables (documented; redundant under privileged)
      - NET_RAW                 # tproxy / raw sockets
    env_file:
      - path: .env              # optional overrides; absent .env is fine (zero-config)
        required: false
    environment:
      PI_GW_NET_BACKEND: linux    # real nft tproxy + policy-routing + host provisioning (LinuxBackend)
      PI_GW_DATA_DIR: /data
      PI_GW_DNSMASQ_LEASES: /data/dnsmasq.leases   # the panel's own dnsmasq leasefile (in the volume)
      PI_GW_PORT: "8080"
    volumes:
      - v2pi-data:/data
      - /etc/NetworkManager/conf.d:/etc/NetworkManager/conf.d   # write the unmanaged drop-in
    restart: unless-stopped

volumes:
  v2pi-data:
